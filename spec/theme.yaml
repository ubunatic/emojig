$schema: ./theme.schema.json
description: Language-neutral theme/palette spec. Colors are stored as semantic values (xterm 256-color indices, or hex for OSC terminal colors) so any renderer can emit its own escape sequences. Mirrors src/term.zig.
notes:
    "0": Black
    "1": Red
    "2": Green
    "3": Yellow
    "4": Blue
    "5": Magenta
    "6": Cyan
    "7": White
    "8": Bright Black (Gray)
    "9": Bright Red
    "10": Bright Green
    "11": Bright Yellow
    "12": Bright Blue
    "13": Bright Magenta
    "14": Bright Cyan
    "15": Bright White
    16-231: 6x6x6 RGB color cube
    232-255: Grayscale ramp (232=darkest, 255=brightest)
    common_indices:
        "24": Muted blue/teal (selection_bg dark)
        "111": Sky blue (selection_bg light)
        "238": Dark gray (search/status bar bg dark)
        "248": Medium light gray (grid/desc text dark)
        "251": Light gray (search/status bar bg light)
        "255": Pure white
icons:
    dark: "\U0001F319"
    light: "\U0001F31E"
    system: "\U0001F506"
    menu: ≡
csd:
    title_bold: false
    title_fg_on_dark: '#e0e0e0'
    title_fg_on_light: '#1e1e1e'
    title_luminance_threshold: 140
    size_fallback: 26
    size_pt_factor: 25
