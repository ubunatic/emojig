description: Текстові рядки інтерфейсу для вибору емодзі (Українська).
search_prompt: " \U0001F50D "
search_placeholder: пошук…
status_help_hint: ' ?:довідка  ↕↔|↵|Esc'
status_matches: ' {count}  ↕↔|↵|Esc'
status_help_hint_wide: ' ?:довідка e:зобр t:текст  ↕↔|↵|Esc'
status_matches_wide: ' {count} e:зобр t:текст  ↕↔|↵|Esc'
help_lines:
    - 'Довідка та Гарячі Клавіші:'
    - '  Введення:Пошук'
    - '  Стрілки: Навігація'
    - '  Enter:   Копіювати та Вийти'
    - '  Tab:     Змінити Тему'
    - '  Esc:     Вийти'
help_lines_more:
    - 'Довідка та Гарячі Клавіші:'
    - ""
    - " e:abc \U0001F50D Лише емодзі"
    - " t:abc \U0001F50D Лише символи"
    - " b:abc \U0001F50D Лише рамки"
    - " a b \U0001F50D   Усі слова"
    - ' ⌫        Назад…'
focus_lost_startup_lines:
    - ⚠️  Немає фокусу
    - спливаючого вікна?
    - ""
    - Клацніть для фокусу!
focus_lost_runtime_lines:
    - ⚠️  Немає фокусу.
    - ""
    - ""
    - Клацніть для фокусу!
