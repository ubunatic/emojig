version: 2

project_name: emojig

builds:
  - id: emojig-linux
    builder: zig
    targets:
      - x86_64-linux-musl
      - aarch64-linux-musl
    binary: emojig
    flags:
      - -Doptimize=ReleaseSmall
      - -Dversion={{ .Version }}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "emojig-{{ .Version }}-{{ .Target }}"
    files:
      - LICENSES/*
      - README.md

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

signs:
  - cmd: sh
    args:
      - -c
      - >-
        minisign -S
        -s "${MINISIGN_KEY_FILE}"
        -m "${artifact}"
        -t "emojig {{ .Version }}"
    artifacts: checksum
    env:
      - MINISIGN_KEY_FILE

nfpms:
  - package_name: emojig
    vendor: Uwe Jugel
    maintainer: Uwe Jugel <uwe.jugel@gmail.com>
    homepage: https://codeberg.org/ubunatic/emojig
    description: Zero-allocation emoji picker for Wayland/X11
    license: AGPL-3.0-or-later
    formats:
      - deb
      - rpm
    recommends:
      - wl-clipboard
    suggests:
      - xclip
      - foot

# Publishing is handled by fj (forgejo-cli) — run with --skip=publish.

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
